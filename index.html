<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: #d4af37; color: #020617; }
        .btn-save { background: #22c55e; color: white; }
        .registro { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #d4af37; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escala Renascer</h1>
    <div class="card">
        <input type="date" id="data">
        <input type="time" id="hora">
        <input type="text" id="musica" placeholder="Música">
        <button class="btn-gold" onclick="addM()">+ ADD MÚSICA</button>
        <select id="integrante">
            <option>Márcia</option><option>Estefany</option><option>Davi</option><option>Max</option>
        </select>
        <select id="funcao">
            <option>Cantor</option><option>Cantora</option><option>Baterista</option>
        </select>
        <button class="btn-gold" onclick="addI()">+ ADD INTEGRANTE</button>
        <div id="status" style="color:#d4af37; font-size: 0.8rem; margin-top:10px;"></div>
    </div>

    <button class="btn-save" onclick="salvar()">SALVAR ESCALA NO BANCO</button>

    <div id="lista" style="margin-top:20px;"></div>
</div>

<script>
    let tM = [], tI = [];

    function addM() {
        let m = document.getElementById('musica').value;
        if(m) { tM.push(m); document.getElementById('musica').value = ''; }
    }
    function addI() {
        let n = document.getElementById('integrante').value;
        let f = document.getElementById('funcao').value;
        tI.push(n + " (" + f + ")");
    }

    function salvar() {
        let data = document.getElementById('data').value;
        let hora = document.getElementById('hora').value;
        
        // Criar o objeto
        let novaEscala = { id: Date.now(), data, hora, musicas: tM, equipe: tI };
        
        // Recuperar e salvar
        try {
            let db = localStorage.getItem('escalaRenascer');
            db = db ? JSON.parse(db) : [];
            db.push(novaEscala);
            localStorage.setItem('escalaRenascer', JSON.stringify(db));
            
            // Limpar
            tM = []; tI = [];
            alert("Salvo com sucesso!");
            render();
        } catch(e) {
            alert("Erro ao salvar: " + e);
        }
    }

    function render() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer') || '[]');
        let div = document.getElementById('lista');
        div.innerHTML = db.map(e => `
            <div class="registro">
                <strong>${e.data} ${e.hora}</strong><br>
                Músicas: ${e.musicas.join(', ')}<br>
                Equipe: ${e.equipe.join(', ')}<br>
                <button onclick="window.open('https://wa.me/?text=Escala%20${e.data}%20${e.hora}')">WhatsApp</button>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
