<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer</title>
    <style>
        :root { --primary: #4a6fa5; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        /* Sistema de Abas */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; border: none; background: #ddd; border-radius: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content { display: none; }
        .content.active { display: block; }

        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 6px; cursor: pointer; }
        .registro { border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escala Renascer</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="mostrar('cadastro')">Cadastro</button>
        <button class="tab-btn" onclick="mostrar('historico')">Histórico</button>
    </div>

    <!-- PÁGINA DE CADASTRO -->
    <div id="cadastro" class="content active">
        <input type="date" id="data">
        <input type="time" id="horario">
        <input type="text" id="musica" placeholder="Nome da Música">
        <input type="text" id="autor" placeholder="Autor">
        <input type="text" id="tom" placeholder="Tom">
        <input type="text" id="integrante" placeholder="Nome do Integrante">
        <select id="funcao">
            <option>Tecladista</option><option>Baterista</option><option>Vocalista</option>
            <option>Baixista</option><option>Guitarrista</option><option>Violonista</option>
            <option>Backing vocal</option>
        </select>
        <button class="action-btn" onclick="salvar()">Registrar</button>
    </div>

    <!-- PÁGINA DE HISTÓRICO -->
    <div id="historico" class="content">
        <div id="lista"></div>
    </div>
</div>

<script>
    // Sistema de abas
    function mostrar(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'historico') exibir();
    }

    // Lógica do "Banco de Dados"
    function salvar() {
        const novo = {
            id: Date.now(),
            data: document.getElementById('data').value,
            horario: document.getElementById('horario').value,
            musica: document.getElementById('musica').value,
            autor: document.getElementById('autor').value,
            tom: document.getElementById('tom').value,
            nome: document.getElementById('integrante').value,
            funcao: document.getElementById('funcao').value
        };

        if(!novo.data || !novo.nome) { alert("Preencha data e integrante!"); return; }

        let banco = JSON.parse(localStorage.getItem('bancoEscala')) || [];
        banco.push(novo);
        localStorage.setItem('bancoEscala', JSON.stringify(banco));
        alert("Ensaio registrado!");
        document.getElementById('integrante').value = '';
    }

    function exibir() {
        let banco = JSON.parse(localStorage.getItem('bancoEscala')) || [];
        document.getElementById('lista').innerHTML = banco.map(e => `
            <div class="registro">
                <b>${e.data.split('-').reverse().join('/')} - ${e.horario}</b><br>
                Música: ${e.musica} (${e.tom}) por ${e.autor}<br>
                Integrante: ${e.nome} (${e.funcao})<br>
                <button class="btn-del" onclick="excluir(${e.id})">Excluir</button>
            </div>
        `).join('');
    }

    function excluir(id) {
        let banco = JSON.parse(localStorage.getItem('bancoEscala')) || [];
        banco = banco.filter(e => e.id !== id);
        localStorage.setItem('bancoEscala', JSON.stringify(banco));
        exibir();
    }
</script>

</body>
</html>
