<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5em; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-top: 5px; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-add { background: #27ae60; }
        .btn-save { background: var(--primary); }
        .card { border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid var(--accent); position: relative; }
        .btn-del { background: #e74c3c; padding: 5px 10px; border: none; color: white; cursor: pointer; border-radius: 3px; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>𝄞 Escala Renascer</h1>
    
    <label>Data:</label>
    <input type="date" id="data">
    
    <label>Horário:</label>
    <input type="time" id="horario">

    <label>Músicas:</label>
    <input type="text" id="musica-input" list="lista-musicas-rp" placeholder="Digite ou selecione a música">
    <datalist id="lista-musicas-rp">
        <option value="Restitui">
        <option value="Eu Vou Viver">
        <option value="Deus da Força">
        <option value="A Resposta">
        <option value="O Cheiro das Águas">
        <option value="Viverei Teu Milagre">
        <option value="Não Morrerei">
        <option value="Deus de Milagres">
        <option value="Som da Alegria">
        <option value="Na Terra do Leite e Mel">
        <option value="Autor da Vida">
        <option value="Daniel">
        <option value="Jesus é o Caminho">
        <option value="Poderoso Deus">
        <option value="O Tempo de Deus">
        <option value="Consagração">
    </datalist>
    <button class="btn btn-add" onclick="addItem('musica')">+ Adicionar Música</button>
    <div id="display-musicas" style="font-size: 0.9em; margin-top:5px; color:#555;"></div>

    <label>Integrante:</label>
    <select id="integrante-input">
        <option>Márcia</option><option>Estefany</option><option>Isabelle</option>
        <option>Davi</option><option>Paulinho</option><option>Fernando</option><option>Max</option>
    </select>
    
    <label>Função:</label>
    <select id="funcao-input">
        <option>Backing vocal</option><option>Baterista</option><option>Baixista</option>
        <option>Guitarrista</option><option>Tecladista</option><option>Violonista</option>
    </select>
    <button class="btn btn-add" onclick="addItem('integrante')">+ Adicionar Integrante</button>
    <div id="display-integrantes" style="font-size: 0.9em; margin-top:5px; color:#555;"></div>

    <button class="btn btn-save" onclick="salvarEscalaFinal()">Salvar Escala Completa</button>

    <div id="lista-eventos"></div>
</div>

<script>
    let escalaAtual = { musicas: [], integrantes: [] };

    function addItem(tipo) {
        if(tipo === 'musica') {
            let val = document.getElementById('musica-input').value;
            if(val) { escalaAtual.musicas.push(val); document.getElementById('musica-input').value = ''; }
        } else {
            let nome = document.getElementById('integrante-input').value;
            let func = document.getElementById('funcao-input').value;
            escalaAtual.integrantes.push(`${nome} (${func})`);
        }
        renderTemp();
    }

    function renderTemp() {
        document.getElementById('display-musicas').innerHTML = '<b>Músicas:</b> ' + escalaAtual.musicas.join(', ');
        document.getElementById('display-integrantes').innerHTML = '<b>Equipe:</b> ' + escalaAtual.integrantes.join(', ');
    }

    function salvarEscalaFinal() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        let final = {
            id: Date.now(),
            data: document.getElementById('data').value,
            hora: document.getElementById('horario').value,
            ...escalaAtual
        };
        db.push(final);
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        escalaAtual = { musicas: [], integrantes: [] };
        renderTemp();
        renderFinal();
    }

    function renderFinal() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        document.getElementById('lista-eventos').innerHTML = db.map(e => `
            <div class="card">
                <strong>${e.data} às ${e.hora}</strong><br>
                <small>${e.musicas.join(' | ')}</small><br>
                <small><b>Equipe:</b> ${e.integrantes.join(', ')}</small><br>
                <button class="btn-del" onclick="excluir(${e.id})">Excluir Escala</button>
            </div>
        `).join('');
    }

    function excluir(id) {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')).filter(x => x.id != id);
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        renderFinal();
    }

    renderFinal();
</script>
</body>
</html>
