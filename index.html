<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer Pro</title>
    <style>
        :root { --dark: #0f172a; --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        h1 { text-align: center; color: var(--gold); margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin: 10px 0 5px; color: #94a3b8; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #334155; color: white; margin-bottom: 10px; font-size: 1rem; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: var(--dark); }
        .btn-blue { background: #3b82f6; color: white; }
        .registro { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>Escala Renascer</h1>
    
    <div class="card">
        <label>Data</label>
        <input type="date" id="data">
        <label>Integrante</label>
        <select id="integrante">
            <option>Márcia</option><option>Estefany</option><option>Isabelle</option>
            <option>Davi</option><option>Paulinho</option><option>Fernando</option><option>Max</option>
        </select>
        <button class="btn-gold" onclick="salvarDireto()">+ ADICIONAR INTEGRANTE</button>
    </div>

    <div id="lista-db"></div>
</div>

<script>
    // Função que salva DIRETAMENTE no banco sem variáveis temporárias
    function salvarDireto() {
        let data = document.getElementById('data').value;
        let nome = document.getElementById('integrante').value;
        
        if(!data) { alert("Escolha uma data primeiro!"); return; }

        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        db.push({ id: Date.now(), data: data, nome: nome });
        
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        renderizar();
    }

    function renderizar() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        let html = "<h2>Registros:</h2>";
        db.forEach(e => {
            html += `
                <div class="registro">
                    <strong>Data: ${e.data}</strong><br>
                    Integrante: ${e.nome}<br>
                    <button class="btn-blue" style="padding:5px; font-size:0.7rem; margin-top:10px;" onclick="enviarWP('${e.data}', '${e.nome}')">WhatsApp</button>
                </div>
            `;
        });
        document.getElementById('lista-db').innerHTML = html;
    }

    function enviarWP(data, nome) {
        window.open(`https://wa.me/?text=Escala%20do%20dia%20${data}:%20${nome}`, '_blank');
    }

    // Carrega ao iniciar
    renderizar();
</script>
</body>
</html>
