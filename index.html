<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala Renascer - Gestão de Ministério</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--accent); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 120px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .evento-bloco { background: white; border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .integrante-item { background: #f8f9fa; padding: 5px; margin: 5px 0; border-radius: 4px; border-left: 3px solid var(--accent); font-size: 0.9em; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <!-- Substitua o src abaixo pela URL do logo da sua igreja -->
        <img src="https://cdn-icons-png.flaticon.com/512/2913/2913506.png" alt="Logo">
        <h1>Escala Renascer</h1>
    </div>

    <input type="date" id="data">
    <input type="time" id="horario">
    <input type="text" id="musica" placeholder="Música e Tom">
    <input type="text" id="nome" placeholder="Nome do Integrante">
    <select id="funcao">
        <option>Tecladista</option><option>Baterista</option><option>Vocalista</option>
        <option>Baixista</option><option>Guitarrista</option><option>Violonista</option>
        <option>Backing vocal</option>
    </select>
    <button onclick="adicionar()">Adicionar à Escala</button>

    <div id="lista-eventos"></div>
</div>

<script>
    function adicionar() {
        let evento = {
            id: Date.now(),
            data: document.getElementById('data').value,
            hora: document.getElementById('horario').value,
            musica: document.getElementById('musica').value,
            nome: document.getElementById('nome').value,
            funcao: document.getElementById('funcao').value
        };

        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        db.push(evento);
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        document.getElementById('nome').value = '';
        renderizar();
    }

    function renderizar() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        // Agrupar por data e hora
        let grupos = {};
        db.forEach(e => {
            let chave = e.data + " " + e.hora + " | " + e.musica;
            if(!grupos[chave]) grupos[chave] = [];
            grupos[chave].push(e);
        });

        let html = '';
        for(let chave in grupos) {
            let [dataHora, musica] = chave.split(" | ");
            let [data, hora] = dataHora.split(" ");
            html += `<div class="evento-bloco">
                        <strong>Data:</strong> ${data.split('-').reverse().join('/')} às ${hora}<br>
                        <strong>Música:</strong> ${musica}
                        <hr>`;
            grupos[chave].forEach(i => {
                html += `<div class="integrante-item">
                            ${i.nome} - <em>${i.funcao}</em>
                            <span style="color:red; cursor:pointer;" onclick="excluir(${i.id})">✖</span>
                         </div>`;
            });
            html += `</div>`;
        }
        document.getElementById('lista-eventos').innerHTML = html;
    }

    function excluir(id) {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        db = db.filter(i => i.id !== id);
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        renderizar();
    }

    renderizar();
</script>
</body>
</html>
