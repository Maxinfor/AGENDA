<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala Renascer - Profissional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1a2a3a; font-size: 1.5em; text-transform: uppercase; }
        label { font-weight: bold; color: #444; display: block; margin-top: 10px; font-size: 0.85em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-add { background: #c5a059; }
        .btn-save { background: #27ae60; font-size: 1.1em; }
        .card { background: #f9f9f9; padding: 15px; margin-top: 15px; border-radius: 12px; border-left: 6px solid #c5a059; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-list { font-size: 0.85em; color: #555; margin: 5px 0; background: #eee; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>𝄞 Escala Renascer</h1>
    
    <label>Data:</label>
    <input type="date" id="data">
    <label>Horário:</label>
    <input type="time" id="horario">

    <label>Música:</label>
    <input type="text" id="musica-input" list="lista-musicas">
    <datalist id="lista-musicas"></datalist>
    <button class="btn btn-add" onclick="adicionarItem('musica')">+ Adicionar Música</button>
    <div id="lista-musicas-display"></div>

    <label>Integrante:</label>
    <select id="integrante-input">
        <option>Márcia</option><option>Estefany</option><option>Isabelle</option>
        <option>Davi</option><option>Paulinho</option><option>Fernando</option><option>Max</option>
    </select>
    <label>Função:</label>
    <select id="funcao-input">
        <option>Cantor</option><option>Cantora</option><option>Backing vocal</option>
        <option>Baterista</option><option>Baixista</option><option>Guitarrista</option>
        <option>Tecladista</option><option>Violonista</option>
    </select>
    <button class="btn btn-add" onclick="adicionarItem('integrante')">+ Adicionar Integrante</button>
    <div id="lista-integrantes-display"></div>

    <button class="btn btn-save" onclick="salvarNoBanco()" style="margin-top:20px;">SALVAR ESCALA COMPLETA</button>

    <div id="historico"></div>
</div>

<script>
    // Lista de músicas mantida
    const musicasRP = ["Restitui", "Eu Vou Viver", "Deus da Força", "A Resposta", "O Cheiro das Águas", "Não Morrerei", "Deus de Milagres", "Som da Alegria", "Autor da Vida", "Daniel", "Jesus é o Caminho", "Poderoso Deus", "Consagração", "Toma o Teu Lugar", "Propósito", "Santo", "Fogo e Glória", "Inesquecível", "Bom é Louvar", "Promessa", "Vem Espírito", "Dono de Tudo", "Tudo Pode Mudar", "Yeshua", "Clamo Sangue", "Atos 2", "Deus de Aliança", "Grandes Coisas", "Me leva pra casa", "Ouve meu clamor", "Vem me buscar", "Tu és Fiel", "Alegria do Senhor", "Amigo de Deus", "Bênçãos que não têm fim", "Corpo e Família", "Deus do Impossível", "Digno é o Senhor", "Diz", "És o Amor", "Eu me rendo", "Faz um milagre em mim", "Incomparável", "Lugar de Adoração", "Mais que Vencedor", "Nada vai me separar", "Pai de Amor", "Precioso", "Quero te adorar", "Rei dos Reis", "Se o Espírito de Deus", "Um milagre", "Deus é Fiel", "Nada é impossível", "Poder do Sangue", "Graça", "Santo Espírito", "A Ti a Glória", "Tu és Bom", "Vitorioso", "Agnus Dei", "Caminho no Deserto", "Desperta", "Diante do Trono", "Em Teus Braços", "Espontâneo", "Essência da Adoração", "Eu Escolho Deus", "Eu Te Busco", "Face a Face", "Fiz este hino", "Glória a Deus", "Hosana", "Lindo És", "Livre", "Mais de Ti", "Meu Universo", "Na casa do Pai", "Nasci para adorar", "No altar", "O meu milagre", "Onde o Espírito de Deus está", "Paz", "Pois Tu és Santo", "Quebrantado", "Quão grande é o meu Deus", "Sobre as águas", "Teu amor não falha", "Tua presença"];
    const dl = document.getElementById('lista-musicas');
    musicasRP.forEach(m => dl.innerHTML += `<option value="${m}">`);

    // Variáveis de controle
    let bufferMusicas = [];
    let bufferIntegrantes = [];

    function adicionarItem(tipo) {
        if(tipo === 'musica') {
            let val = document.getElementById('musica-input').value;
            if(val) { bufferMusicas.push(val); renderBuffers(); document.getElementById('musica-input').value = ''; }
        } else {
            let nome = document.getElementById('integrante-input').value;
            let func = document.getElementById('funcao-input').value;
            bufferIntegrantes.push(nome + " (" + func + ")");
            renderBuffers();
        }
    }

    function renderBuffers() {
        document.getElementById('lista-musicas-display').innerHTML = bufferMusicas.map(m => `<div class="item-list">🎵 ${m}</div>`).join('');
        document.getElementById('lista-integrantes-display').innerHTML = bufferIntegrantes.map(i => `<div class="item-list">👤 ${i}</div>`).join('');
    }

    function salvarNoBanco() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        let novaEscala = {
            id: Date.now(),
            data: document.getElementById('data').value,
            hora: document.getElementById('horario').value,
            musicas: [...bufferMusicas],
            integrantes: [...bufferIntegrantes]
        };
        
        db.push(novaEscala);
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        
        // Limpar tudo
        bufferMusicas = []; bufferIntegrantes = [];
        renderBuffers();
        carregarHistorico();
    }

    function carregarHistorico() {
        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        document.getElementById('historico').innerHTML = db.map(e => `
            <div class="card">
                <strong>📅 ${e.data} - ${e.hora}</strong><br>
                <small>Músicas: ${e.musicas.join(', ')}</small><br>
                <small>Equipe: ${e.integrantes.join(' | ')}</small><br>
                <button class="btn" style="background:#25d366; font-size:0.8em; padding:5px;" onclick="enviarWP('${e.data}', '${e.musicas}', '${e.integrantes}')">Enviar WhatsApp</button>
            </div>
        `).join('');
    }

    function enviarWP(data, mus, int) {
        window.open(`https://wa.me/?text=*Escala:* ${data}%0A*Músicas:* ${mus}%0A*Equipe:* ${int}`, '_blank');
    }

    carregarHistorico();
</script>
</body>
</html>
