<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-add { background: #27ae60; }
        .btn-save { background: var(--primary); }
        .card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 5px solid var(--accent); }
        .actions { margin-top: 10px; }
        .edit { background: orange; margin-right: 5px; }
        .delete { background: red; }
    </style>
</head>
<body>

<div class="container">
    <h1>𝄞 Escala Renascer</h1>
    
    <div class="input-group">
        <label>Data</label>
        <input type="date" id="data">
    </div>
    <div class="input-group">
        <label>Horário</label>
        <input type="time" id="horario">
    </div>
    <div class="input-group">
        <label>Música e Tom</label>
        <input type="text" id="musica-input" placeholder="Ex: Hosana - D">
        <button class="btn btn-add" onclick="addMusica()">Adicionar Música</button>
        <div id="lista-musicas-view"></div>
    </div>
    <div class="input-group">
        <label>Integrante</label>
        <input type="text" id="nome">
    </div>
    <div class="input-group">
        <label>Função</label>
        <select id="funcao">
            <option>Backing vocal</option>
            <option>Baterista</option>
            <option>Baixista</option>
            <option>Guitarrista</option>
            <option>Tecladista</option>
            <option>Violonista</option>
        </select>
    </div>

    <input type="hidden" id="edit-id">
    <button class="btn btn-save" onclick="salvarEvento()">Salvar Escala</button>

    <div id="display-escala"></div>
</div>

<script>
    let musicas = [];

    function addMusica() {
        const m = document.getElementById('musica-input');
        if(m.value) {
            musicas.push(m.value);
            m.value = '';
            document.getElementById('lista-musicas-view').innerHTML = musicas.join(', ');
        }
    }

    function salvarEvento() {
        const id = document.getElementById('edit-id').value;
        const evento = {
            id: id ? parseInt(id) : Date.now(),
            data: document.getElementById('data').value,
            hora: document.getElementById('horario').value,
            musicas: musicas,
            nome: document.getElementById('nome').value,
            funcao: document.getElementById('funcao').value
        };

        let db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        
        if(id) {
            db = db.map(e => e.id == id ? evento : e);
        } else {
            db.push(evento);
        }

        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        resetForm();
        render();
    }

    function render() {
        const db = JSON.parse(localStorage.getItem('escalaRenascer')) || [];
        const container = document.getElementById('display-escala');
        container.innerHTML = '';
        
        db.forEach(e => {
            container.innerHTML += `
                <div class="card">
                    <strong>${e.data} - ${e.hora}</strong><br>
                    Músicas: ${e.musicas.join(', ')}<br>
                    <strong>${e.nome}</strong> (${e.funcao})
                    <div class="actions">
                        <button class="btn edit" onclick="editar(${e.id})">Editar</button>
                        <button class="btn delete" onclick="excluir(${e.id})">Excluir</button>
                    </div>
                </div>
            `;
        });
    }

    function editar(id) {
        const db = JSON.parse(localStorage.getItem('escalaRenascer'));
        const e = db.find(x => x.id == id);
        document.getElementById('edit-id').value = e.id;
        document.getElementById('data').value = e.data;
        document.getElementById('horario').value = e.hora;
        document.getElementById('nome').value = e.nome;
        document.getElementById('funcao').value = e.funcao;
        musicas = e.musicas;
        document.getElementById('lista-musicas-view').innerHTML = musicas.join(', ');
    }

    function excluir(id) {
        let db = JSON.parse(localStorage.getItem('escalaRenascer'));
        db = db.filter(x => x.id != id);
        localStorage.setItem('escalaRenascer', JSON.stringify(db));
        render();
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('nome').value = '';
        musicas = [];
        document.getElementById('lista-musicas-view').innerHTML = '';
    }

    render();
</script>
</body>
</html>
