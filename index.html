<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer</title>
    <style>
        :root { --primary: #4a6fa5; --danger: #e74c3c; --edit: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .btn-add { background: var(--primary); }
        .btn-edit { background: var(--edit); }
        .btn-del { background: var(--danger); }
        .registro { border-bottom: 1px solid #eee; padding: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escala Renascer</h1>
    <input type="text" id="integrante" placeholder="Nome do Integrante">
    <input type="text" id="funcao" placeholder="Função">
    <input type="date" id="data">
    <input type="time" id="horario">
    <input type="text" id="musica" placeholder="Nome da Música">
    <input type="text" id="autor" placeholder="Autor">
    <input type="text" id="tom" placeholder="Tom">
    
    <button class="btn-add" onclick="salvar()">Salvar Ensaio</button>

    <h3>Histórico</h3>
    <div id="lista"></div>
</div>

<script>
    let ensaios = JSON.parse(localStorage.getItem('ensaios')) || [];

    function salvar() {
        const novo = {
            id: Date.now(),
            integrante: document.getElementById('integrante').value,
            funcao: document.getElementById('funcao').value,
            data: document.getElementById('data').value,
            horario: document.getElementById('horario').value,
            musica: document.getElementById('musica').value,
            autor: document.getElementById('autor').value,
            tom: document.getElementById('tom').value
        };
        ensaios.push(novo);
        atualizarStorage();
    }

    function excluir(id) {
        ensaios = ensaios.filter(e => e.id !== id);
        atualizarStorage();
    }

    function editar(id) {
        const e = ensaios.find(i => i.id === id);
        document.getElementById('integrante').value = e.integrante;
        document.getElementById('funcao').value = e.funcao;
        document.getElementById('data').value = e.data;
        document.getElementById('horario').value = e.horario;
        document.getElementById('musica').value = e.musica;
        document.getElementById('autor').value = e.autor;
        document.getElementById('tom').value = e.tom;
        excluir(id);
    }

    function atualizarStorage() {
        localStorage.setItem('ensaios', JSON.stringify(ensaios));
        exibir();
    }

    function exibir() {
        document.getElementById('lista').innerHTML = ensaios.map(e => `
            <div class="registro">
                <strong>${e.data} às ${e.horario}</strong><br>
                Música: ${e.musica} (${e.tom}) por ${e.autor}<br>
                Integrantes: ${e.integrante} - ${e.funcao}
                <div class="btn-group">
                    <button class="btn-edit" onclick="editar(${e.id})">Editar</button>
                    <button class="btn-del" onclick="excluir(${e.id})">Excluir</button>
                </div>
            </div>
        `).join('');
    }

    exibir();
</script>

</body>
</html>
